<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Key Akses</title>
    <meta name="robots" content="noindex, nofollow">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
        body{background:#0f0f1a;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .container{width:100%;max-width:400px;background:#1a1a2e;border-radius:12px;padding:30px;border:1px solid #2a2a4a}
        h1{color:#fff;font-size:20px;text-align:center;margin-bottom:6px}
        .sub{color:#8899aa;font-size:12px;text-align:center;margin-bottom:25px}
        label{display:block;color:#aabbcc;font-size:13px;margin-bottom:6px;font-weight:500}
        input{width:100%;padding:12px;background:#0f0f1a;border:1px solid #2a2a4a;border-radius:6px;color:#fff;font-size:14px;margin-bottom:15px;outline:none}
        input:focus{border-color:#00bfff}
        input::placeholder{color:#556}
        .btn{width:100%;padding:12px;background:#00bfff;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px}
        .btn:hover{background:#0099dd}
        .btn-red{background:#ef4444}
        .btn-red:hover{background:#dc2626}
        .msg{text-align:center;font-size:13px;margin-top:10px;display:none;padding:10px;border-radius:6px}
        .msg.show{display:block}
        .msg-ok{background:#065f46;color:#d1fae5}
        .msg-err{background:#991b1b;color:#fee2e2}
        .msg-info{background:#1e3a5f;color:#bfdbfe}
    </style>
</head>
<body>
    <div class="container">
        <h1>Set Key Akses</h1>
        <div class="sub">Key untuk verifikasi sebelum login</div>
        
        <label>Key Saat Ini</label>
        <input type="password" id="currentKey" placeholder="Masukkan key saat ini" maxlength="50">
        
        <label>Key Baru</label>
        <input type="password" id="newKey" placeholder="Masukkan key baru" maxlength="50">
        
        <label>Konfirmasi Key Baru</label>
        <input type="password" id="confirmKey" placeholder="Konfirmasi key baru" maxlength="50">
        
        <button class="btn" onclick="setKey()">Simpan Key Baru</button>
        <button class="btn btn-red" onclick="resetKey()">Reset Key (Darurat)</button>
        
        <div id="msg" class="msg"></div>
    </div>

    <script>
        var API_REVANSTORE = 'api/revanstore';
        var ADMIN_KEY = 'dhagwxwhu:f4afc5aa03e73130f5e055dfe6a708c4dc40759b';
        var API_KEY = '835a198a-7843-4e13-a085-331eb891100e';
        var fingerprint = '';
        
        async function getFingerprint() {
            var fp = '';
            fp += navigator.userAgent || '';
            fp += navigator.language || '';
            fp += (screen.width || 0) + 'x' + (screen.height || 0);
            fp += screen.colorDepth || '';
            fp += new Date().getTimezoneOffset();
            fp += navigator.hardwareConcurrency || '';
            fp += navigator.deviceMemory || '';
            fp += navigator.platform || '';
            return CryptoJS.MD5(fp).toString();
        }
        
        async function apiCall(path, method, data) {
            if (!fingerprint) fingerprint = await getFingerprint();
            var payload = CryptoJS.AES.encrypt(JSON.stringify({ path: path, method: method, data: data }), ADMIN_KEY).toString();
            var res = await fetch(API_REVANSTORE, { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY, 'X-Fingerprint': fingerprint }, body: JSON.stringify({ data: payload }) });
            if (!res.ok) throw new Error('Server error: ' + res.status);
            var result = await res.json();
            if (result.error) throw new Error(result.error);
            if (result.encrypted) { var dec = CryptoJS.AES.decrypt(result.data, ADMIN_KEY).toString(CryptoJS.enc.Utf8); return JSON.parse(dec); }
            return result;
        }
        
        function showMsg(t, type) {
            var m = document.getElementById('msg');
            m.textContent = t;
            m.className = 'msg show msg-' + type;
            setTimeout(function() { m.classList.remove('show'); }, 3000);
        }
        
        async function setKey() {
            var cur = document.getElementById('currentKey').value.trim();
            var nw = document.getElementById('newKey').value.trim();
            var cf = document.getElementById('confirmKey').value.trim();
            
            if (!cur || !nw || !cf) return showMsg('Semua field wajib diisi', 'err');
            if (nw !== cf) return showMsg('Key baru tidak cocok', 'err');
            if (nw.length < 4) return showMsg('Key minimal 4 karakter', 'err');
            
            try {
                var r = await apiCall('access_key', 'GET');
                
                if (!r || !r.key) {
                    await apiCall('access_key', 'PUT', { key: nw });
                    document.getElementById('currentKey').value = '';
                    document.getElementById('newKey').value = '';
                    document.getElementById('confirmKey').value = '';
                    return showMsg('Key berhasil dibuat!', 'ok');
                }
                
                if (r.key !== cur) {
                    await apiCall('admin/login_failed', 'POST', {});
                    return showMsg('Key saat ini salah!', 'err');
                }
                
                await apiCall('admin/login_success', 'POST', {});
                await apiCall('access_key', 'PUT', { key: nw });
                
                document.getElementById('currentKey').value = '';
                document.getElementById('newKey').value = '';
                document.getElementById('confirmKey').value = '';
                showMsg('Key berhasil diubah!', 'ok');
            } catch (e) {
                showMsg('Error: ' + e.message, 'err');
            }
        }
        
        async function resetKey() {
            var cur = document.getElementById('currentKey').value.trim();
            var nw = document.getElementById('newKey').value.trim();
            
            if (!cur || !nw) return showMsg('Isi key saat ini dan key baru untuk reset', 'err');
            
            try {
                var r = await apiCall('access_key', 'GET');
                
                if (!r || !r.key) {
                    await apiCall('access_key', 'PUT', { key: nw });
                    document.getElementById('currentKey').value = '';
                    document.getElementById('newKey').value = '';
                    document.getElementById('confirmKey').value = '';
                    return showMsg('Key berhasil dibuat!', 'ok');
                }
                
                if (r.key !== cur) {
                    await apiCall('admin/login_failed', 'POST', {});
                    return showMsg('Key saat ini salah! Reset dibatalkan', 'err');
                }
                
                await apiCall('admin/login_success', 'POST', {});
                await apiCall('access_key', 'PUT', { key: nw });
                
                document.getElementById('currentKey').value = '';
                document.getElementById('newKey').value = '';
                document.getElementById('confirmKey').value = '';
                showMsg('Key berhasil direset!', 'ok');
            } catch (e) {
                showMsg('Error: ' + e.message, 'err');
            }
        }
        
        document.getElementById('confirmKey').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') setKey();
        });
    </script>
</body>
</html>
