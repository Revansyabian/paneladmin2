<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Admin BUSSID</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
        body{background:linear-gradient(135deg,#0a0a0a,#1a1a2e);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .container{width:100%;max-width:450px;background:#1e1e2e;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.5);overflow:hidden;border:1px solid #2a2a3e}
        .header{background:linear-gradient(135deg,#0f3460,#16213e);color:#e94560;padding:25px;text-align:center;border-bottom:2px solid #e94560}
        .header h1{font-size:24px;text-transform:uppercase;letter-spacing:1px}
        .header .subtitle{font-size:12px;color:#a0a0b0;margin-top:5px}
        .content{padding:30px}
        .input-box{margin-bottom:20px}
        .input-box label{display:block;margin-bottom:8px;color:#a0a0b0;font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:1px}
        .input-box input{width:100%;padding:14px 16px;border:2px solid #2a2a3e;border-radius:10px;font-size:15px;background:#16162a;color:#e0e0e0;transition:all 0.3s}
        .input-box input:focus{border-color:#e94560;outline:none;box-shadow:0 0 20px rgba(233,69,96,0.15);background:#1a1a30}
        .btn{width:100%;padding:15px;background:linear-gradient(135deg,#e94560,#c23152);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;transition:all 0.3s;text-transform:uppercase;letter-spacing:1px}
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(233,69,96,0.3)}
        .btn:disabled{opacity:0.5;cursor:not-allowed}
        .alert-box{position:fixed;top:20px;right:20px;background:#1e1e2e;color:#e0e0e0;padding:20px;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,0.5);display:none;z-index:9999;max-width:350px;border-left:5px solid #e94560;animation:slideIn 0.3s ease-out}
        .alert-box.show{display:block}
        .alert-box.success{border-left-color:#00b894}
        .alert-box.error{border-left-color:#d63031}
        .alert-box.info{border-left-color:#00bfff}
        #alertTitle{font-weight:bold;font-size:16px;margin-bottom:5px}
        #alertMessage{font-size:14px;opacity:0.9}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        .back-link{text-align:center;margin-top:20px}
        .back-link a{color:#a0a0b0;text-decoration:none;font-size:13px;transition:all 0.3s}
        .back-link a:hover{color:#e94560}
    </style>
</head>
<body>
    <div id="alertBox" class="alert-box">
        <div id="alertTitle"></div>
        <div id="alertMessage"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>➕ Tambah Admin</h1>
            <div class="subtitle">BUSSID Panel</div>
        </div>
        <div class="content">
            <div class="input-box">
                <label>Email</label>
                <input type="email" id="adminEmail" placeholder="admin@bussid.com" autocomplete="off">
            </div>
            <div class="input-box">
                <label>Password</label>
                <input type="password" id="adminPass" placeholder="Minimal 6 karakter" autocomplete="off">
            </div>
            <button class="btn" id="btnSubmit" onclick="tambahAdmin()">✅ Tambah Admin</button>
            <div class="back-link">
                <a href="index.html">← Kembali ke Panel Admin</a>
            </div>
        </div>
    </div>

 <script>
    var API_REVANSTORE = '/api/revanstore';
    var ADMIN_KEY = 'dhagwxwhu:f4afc5aa03e73130f5e055dfe6a708c4dc40759b';

    function showAlert(t, m, type) {
        var b = document.getElementById('alertBox');
        document.getElementById('alertTitle').textContent = t;
        document.getElementById('alertMessage').textContent = m;
        b.className = 'alert-box ' + type + ' show';
        setTimeout(function(){ b.classList.remove('show'); }, 4000);
    }

    async function apiCall(path, method, data) {
        var payload = CryptoJS.AES.encrypt(JSON.stringify({ path: path, method: method, data: data }), ADMIN_KEY).toString();
        var res = await fetch(API_REVANSTORE, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: payload })
        });
        var result = await res.json();
        if(result.encrypted) {
            var dec = CryptoJS.AES.decrypt(result.data, ADMIN_KEY).toString(CryptoJS.enc.Utf8);
            return JSON.parse(dec);
        }
        return result;
    }

    async function tambahAdmin() {
        var email = document.getElementById('adminEmail').value.trim();
        var pass = document.getElementById('adminPass').value.trim();

        if (!email || !pass) {
            return showAlert('Gagal', 'Email dan password wajib diisi!', 'error');
        }
        if (pass.length < 6) {
            return showAlert('Gagal', 'Password minimal 6 karakter!', 'error');
        }

        var btn = document.getElementById('btnSubmit');
        btn.disabled = true;
        btn.textContent = '⏳ Menyimpan...';
        showAlert('Proses', 'Menyimpan admin baru...', 'info');

        try {
            var result = await apiCall('admin/auth', 'PUT', {
                email: email,
                password: pass,
                role: 'Admin',
                created: Date.now()
            });

            if (result.success || result.email) {
                showAlert('Berhasil', 'Admin berhasil ditambahkan! Silakan login.', 'success');
                document.getElementById('adminEmail').value = '';
                document.getElementById('adminPass').value = '';
            } else {
                showAlert('Gagal', result.error || 'Gagal menambah admin', 'error');
            }
        } catch (e) {
            showAlert('Error', 'Koneksi gagal: ' + e.message, 'error');
        }

        btn.disabled = false;
        btn.textContent = '✅ Tambah Admin';
    }

    document.getElementById('adminPass').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') tambahAdmin();
    });
</script>
</body>
</html>
