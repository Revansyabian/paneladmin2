<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin BUSSID Panel</title>
    <meta name="robots" content="noindex, nofollow">
   <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00bfff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BUSSID Admin">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2300bfff'/><text x='50' y='65' text-anchor='middle' fill='white' font-size='50' font-weight='bold'>A</text></svg>">
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="main.js"></script>
</head>
<body>
    <div id="alertBox" class="alert-box">
        <div id="alertTitle"></div>
        <div id="alertMessage"></div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title">Edit User</div>
                <button class="close-modal" onclick="closeEditModal()">&times;</button>
            </div>
            <input type="hidden" id="editUserId">
            <div class="input-box"><label>Username</label><input type="text" id="editUsername" maxlength="30"></div>
            <div class="input-box"><label>Password (biarkan kosong jika tidak diubah)</label><input type="text" id="editPassword" placeholder="min 6 karakter" maxlength="50"></div>
            <div class="input-box"><label>Role</label><select id="editRole"><option>Admin</option><option selected>Operator</option><option>User</option><option>VIP</option><option>Premium</option><option>Trial</option></select></div>
            <div class="input-box"><label>Masa Aktif (MM/DD/YYYY)</label><input type="text" id="editExpiryDate" placeholder="01/28/2026" maxlength="10">
                <div class="quick-dates">
                    <span class="date-option" onclick="setQuickDate('edit','permanent')">Permanent</span>
                    <span class="date-option" onclick="setQuickDate('edit','week')">+1 Minggu</span>
                    <span class="date-option" onclick="setQuickDate('edit','month')">+1 Bulan</span>
                    <span class="date-option" onclick="setQuickDate('edit','year')">+1 Tahun</span>
                </div>
            </div>
            <div class="modal-actions"><button class="btn btn-green btn-full" onclick="saveUserChanges()">Simpan</button><button class="btn btn-red btn-full" onclick="closeEditModal()">Batal</button></div>
        </div>
    </div>

    <div class="container" style="max-width:420px;">
        <div id="loginScreen">
            <div class="header"><h1>Admin Panel</h1><div class="subtitle">BUSSID Management</div></div>
            <div class="content">
                <div class="input-box"><label>Email</label><input type="email" id="loginEmail" autocomplete="off" placeholder="admin@bussid.com" maxlength="50"></div>
                <div class="input-box"><label>Password</label><input type="password" id="loginPassword" autocomplete="off" placeholder="Masukkan password" maxlength="50"></div>
                <button class="btn" onclick="login()">Masuk</button>
            </div>
        </div>

        <div id="adminPanel" style="display:none;">
            <div class="header">
                <h1>Panel Admin</h1>
                <div class="subtitle"><span id="loggedUser">-</span></div>
                <button class="logout-btn" onclick="logout()">Keluar</button>
            </div>
            <div class="content">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('adduser')">Tambah User</button>
                    <button class="tab" onclick="switchTab('users')">Daftar User <span id="userCount" class="counter-badge">0</span></button>
                </div>
                <div id="adduser" class="tab-content active">
                    <div class="input-box"><label>Username</label><input type="text" id="newUser" placeholder="operator1" maxlength="30"></div>
                    <div class="input-box"><label>Password (min 6 karakter)</label><input type="text" id="newPass" placeholder="min 6 karakter" maxlength="50"></div>
                    <div class="input-box"><label>Role</label><select id="newRole"><option>Admin</option><option selected>Operator</option><option>User</option><option>VIP</option><option>Premium</option><option>Trial</option></select></div>
                    <div class="input-box"><label>Masa Aktif (MM/DD/YYYY)</label><input type="text" id="newExpiryDate" placeholder="01/28/2026" maxlength="10">
                        <div class="quick-dates">
                            <span class="date-option" onclick="setQuickDate('new','permanent')">Permanent</span>
                            <span class="date-option" onclick="setQuickDate('new','week')">+1 Minggu</span>
                            <span class="date-option" onclick="setQuickDate('new','month')">+1 Bulan</span>
                            <span class="date-option" onclick="setQuickDate('new','year')">+1 Tahun</span>
                        </div>
                    </div>
                    <button class="btn btn-green" onclick="addUserNow()">Tambah User</button>
                </div>
                <div id="users" class="tab-content">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:8px;">
                        <div style="display:flex;gap:6px;flex-wrap:wrap;">
                            <button class="btn-small btn-blue" onclick="loadUsers()">Refresh</button>
                            <button class="btn-small btn-green" onclick="switchTab('adduser')">Tambah</button>
                            <button class="btn-small btn-purple" onclick="setAllUsersPermanent()">Set Permanent</button>
                        </div>
                        <div style="font-size:12px;color:#8899aa;">Total: <span id="totalUsers" style="font-weight:600;color:#1a1a2e;">0</span> user</div>
                    </div>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js').then(function(registration) {
        console.log('SW registered');
      }).catch(function(err) {
        console.log('SW failed:', err);
      });
    });
  }
</script>
                    <div class="search-box"><input type="text" id="searchUser" placeholder="Cari user..." maxlength="50" onkeyup="searchUsers()"></div>
                    <div id="userListContainer" class="user-list"><div style="text-align:center;padding:40px;color:#aabbcc;">Memuat data...</div></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
